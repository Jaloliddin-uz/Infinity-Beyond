<body>
    <header data-aos="fade-up" data-aos-duration="1000" class="site-header">
        <img src="src/Vector.svg" alt="">

    </header>
    <a href="index.html" class="header__link"><i class="fa-solid fa-angle-left"></i>Ortga</a>
    <main class="page">
        <section class="signin-card">
            <h1 data-aos="fade-up" data-aos-duration="1500" class="title">Ro'yxatdan o'tish</h1>
            <p data-aos="fade-up" data-aos-duration="1500" class="textcha">Hello, where have you been? <br> We are so
                happy to have you back.</p>









            <form data-aos="fade-up" data-aos-duration="2000" id="form" class="signin-form">


                <div class="input">
                    <input id="name" type="text" placeholder="Name" />

                </div>
                <p class="error">ㅤ</p>



                <div class="input">
                    <input id="email" type="text" placeholder="E-mail" />

                </div>
                <p class="error1">ㅤ</p>



                <div class="input ">
                    <input id="password" type="password" class="kozcha" placeholder="Password" />
                    <i class="fa-regular fa-eye icon"></i>

                </div>
                <p class="error2">ㅤ</p>





                <div class="input ">
                    <input id="conpassword" type="password" class="conkozcha" placeholder="Confirm password" />
                    <i class="fa-regular fa-eye icon2 "></i>

                </div>
                <p class="error3">ㅤ</p>




                <div class="otish">
                    <button type="submit" class="btn">Ro'yxatdan o'tish</button>
                </div>
            </form>
        </section>
    </main>
