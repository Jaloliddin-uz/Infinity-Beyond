    <link rel="shortcut icon" href="" type="image/x-icon" />
    <link href="
https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css
" rel="stylesheet">
    <link rel="shortcut icon" href="" type="image/x-icon" />


    <!-- (fontawesome link) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        rel="stylesheet">

</head>


<body>



    <header class="site-header" data-aos="fade-up" data-aos-duration="1000">

        <img src="src/Vector.svg" alt="">


    </header>
    <a href="index.html" class="header__link"><i class="fa-solid fa-angle-left"></i>Ortga</a>


    <main class="page">

        <section class="signin-card">

            <h1 data-aos="fade-up" data-aos-duration="1500" class="title">Tizimga kirish</h1>
            <p data-aos="fade-up" data-aos-duration="1500" class="textcha">Hello, where have you been? <br> We are so
                happy to have you back.</p>









            <form id="form" class="signin-form">


                <div data-aos="fade-up" data-aos-duration="1600" class="input">
                    <input id="name" type="text" placeholder="Name" />

                </div>
                <p class="error"></p>



                <div data-aos="fade-up" data-aos-duration="1650" class="input">
                    <input id="email" type="text" placeholder="E-mail" />

                </div>
                <p class="error1"></p>



                <div data-aos="fade-up" data-aos-duration="1700" class="input ">
                    <input id="password" type="password" class="kozcha" placeholder="Password" />
                    <i class="fa-regular fa-eye icon"></i>

                </div>

                <p class="error2"></p>

                <a data-aos="fade-up" data-aos-duration="1700" href="./forgot.html" class="forgot">Forgot password?</a>



                <div data-aos="fade-up" data-aos-duration="1800" class="otish">
                    <button type="submit" class="btn ">Tizmga kirish</button>
                </div>
            </form>
        </section>

    </main>





    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="sign-out.js"></script>
</body>

</html>
